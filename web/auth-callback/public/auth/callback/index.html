<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liftr — Reset password</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, rgba(102, 231, 192, 0.6), rgba(59, 130, 246, 0.5));
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.4);
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: #444; line-height: 1.5; font-size: 0.95rem; }
    a.btn {
      display: block;
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 14px;
      background: #007aff;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    a.btn.secondary { background: #34c759; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Liftr</h1>
    <p id="message">Opening Liftr…</p>
    <div id="actions" class="hidden">
      <a id="ios-btn" class="btn" href="#">Open Liftr (iPhone)</a>
      <a id="android-btn" class="btn secondary" href="#">Open Liftr (Android)</a>
    </div>
  </div>
  <script>
    (function () {
      var IOS_SCHEME = "com.davidgomez.Liftr";
      var ANDROID_SCHEME = "com.lilru.liftr";
      var HOST = "auth-callback";
      var params = window.location.search + window.location.hash;
      var search = new URLSearchParams(window.location.search);
      var hashRaw = (window.location.hash || "").replace(/^#/, "").replace(/^\?/, "");
      var hashParams = new URLSearchParams(hashRaw);
      var error =
        search.get("error") ||
        hashParams.get("error") ||
        search.get("error_code") ||
        hashParams.get("error_code");
      var messageEl = document.getElementById("message");
      var actionsEl = document.getElementById("actions");
      var iosBtn = document.getElementById("ios-btn");
      var androidBtn = document.getElementById("android-btn");
      function deepLink(scheme) {
        return scheme + "://" + HOST + params;
      }
      var iosUrl = deepLink(IOS_SCHEME);
      var androidUrl = deepLink(ANDROID_SCHEME);
      iosBtn.href = iosUrl;
      androidBtn.href = androidUrl;
      actionsEl.classList.remove("hidden");
      if (error) {
        messageEl.textContent =
          "This reset link has expired or is invalid. Open Liftr, go to Profile, tap Forgot password, and request a new link.";
        return;
      }
      messageEl.textContent =
        "Opening Liftr… If nothing happens, tap the button for your device below.";
      var ua = navigator.userAgent || "";
      var primary = /android/i.test(ua) ? androidUrl : iosUrl;
      window.setTimeout(function () {
        window.location.replace(primary);
      }, 120);
    })();
  </script>
</body>
</html>
